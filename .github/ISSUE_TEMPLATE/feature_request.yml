name: 기능 제안
description: 제품 개선, CI 강화, 테스트 추가, 문서 개선 제안을 남깁니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편이나 공백이 있는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 어떤 해결책을 원하는지 구체적으로 적어주세요.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 영향 범위
      description: 앱 UI, 공급자 로직, 저장 구조, CI, Maestro, 문서 중 어디에 영향이 있는지 적어주세요.
  - type: textarea
    id: tests
    attributes:
      label: 필요한 테스트와 문서
      description: 이 변경에 추가되어야 할 테스트/문서를 적어주세요.
