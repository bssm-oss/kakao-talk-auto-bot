name: Release APK

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version_tag: ${{ steps.meta.outputs.version_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        run: echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build and validate release candidates
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease --console=plain

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-quality-reports
          path: |
            app/build/reports/tests/**
            app/build/test-results/**
            app/build/reports/lint-results-*.html
            app/build/intermediates/lint_intermediate_text_report/**

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Require release signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_RELEASE_STORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing release signing secret::$name must be configured for tagged release publishing."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode release signing keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/android-signing"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/release.keystore"

      - name: Build signed release APK
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ runner.temp }}/android-signing/release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --console=plain

      - name: Prepare signed release asset
        run: |
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$signed_apk" ]; then
            echo "::error title=Signed release APK missing::Expected signed APK at $signed_apk after assembleRelease."
            exit 1
          fi
          mkdir -p release-bundle
          cp "$signed_apk" "release-bundle/kakao-auto-reply-${{ needs.validate.outputs.version_tag }}.apk"

      - name: Write release notes header
        run: |
          cat <<'EOF' > release-notes.md
          ## 다운로드

          - `kakao-auto-reply-${{ needs.validate.outputs.version_tag }}.apk`: GitHub Secrets로 서명한 최종 사용자용 릴리즈 APK

          자동 생성 릴리즈 노트는 아래에 이어집니다.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-bundle/*.apk
          body_path: release-notes.md
          generate_release_notes: true
